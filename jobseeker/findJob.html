<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/jobseeker.css" />
    <title>Find Jobs</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <a href="./home.html"><i class="fa-solid fa-briefcase"></i></a>
          <h2>NexJob</h2>
        </div>

        <ul class="nav-menu">
          <li><a href="home.html">Home</a></li>
          <li><a href="findJob.html" class="active">Find Jobs</a></li>
          <li><a href="myapplications.html">My Applications</a></li>
          <li><a href="../auth/login.html">Logout</a></li>
        </ul>
        <button
          id="darkModeToggle"
          class="dark-mode-toggle"
          aria-label="Toggle dark mode"
        >
          <i class="fas fa-moon"></i>
        </button>
        <div class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </nav>

    <header class="search-section">
      <h1>Discover your next <span>opportunity</span></h1>
      <p>Browse thousands of job openings from top companies.</p>
      <div class="search-box">
        <form>
          <i class="fas fa-briefcase"></i>
          <div class="text-1">
            <input
              type="text"
              id="search-title"
              placeholder="Job title, keywords"
            />
          </div>
          <i class="fas fa-chart-line"></i>
          <div class="text-2">
            <input
              type="number"
              id="search-experience"
              placeholder="Years of experience"
              min="0"
            />
          </div>
          <button type="submit">Search</button>
        </form>
      </div>
    </header>
    <main>
      <div class="filter-layout">
        <section class="filters">
          <div class="filters-header">
            <h3>Filters</h3>
            <a href="" class="clear-all">Clear all</a>
          </div>

          <div class="filter-section">
            <h4>Job Type</h4>
            <div class="filter-options">
              <label class="filter-checkbox">
                <input type="checkbox" /> Full-time
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" /> Part-Time
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" /> Freelance
              </label>
            </div>
          </div>

          <div class="filter-section">
            <h4>Date Posted</h4>
            <div class="filter-options">
              <label class="filter-radio">
                <input type="radio" name="date" value="any" /> Any time
              </label>
              <label class="filter-radio">
                <input type="radio" name="date" value="24h" /> Past 24 hours
              </label>
              <label class="filter-radio">
                <input type="radio" name="date" value="week" /> Past week
              </label>
            </div>
          </div>

          <div class="filter-section">
            <h4>Salary Range</h4>
            <div class="salary-inputs">
              <div class="salary-input-group">
                <span>$</span>
                <input type="number" placeholder="Min" />
              </div>
              <div class="salary-input-group">
                <span>$</span>
                <input type="number" placeholder="Max" />
              </div>
            </div>
          </div>
        </section>
      </div>
      <section class="job-listings">
        <h2>Job Listings</h2>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2026 NexJob. All rights reserved.</p>
        <div class="footer-links">
          <a href="../shared/About.html">About</a>
          <a href="../shared/Contact_us.html">Contact</a>
        </div>
      </div>
    </footer>
    <script src="../js/navbar.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/jobseeker.js"></script>
  </body>
</html>
