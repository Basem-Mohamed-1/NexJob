<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – JobBoard</title>
</head>
<body>

  <h1>JobBoard</h1>

  <h2>Sign Up</h2>

  <form id="signup-form">
    <label for="signup-username">Username</label><br>
    <input type="text" id="signup-username" name="username" placeholder="Choose a username"><br><br>

    <label for="signup-email">Email</label><br>
    <input type="email" id="signup-email" name="email" placeholder="you@example.com"><br><br>

    <label for="signup-password">Password</label><br>
    <input type="password" id="signup-password" name="password" placeholder="Create a password"><br><br>

    <label for="signup-confirm">Confirm Password</label><br>
    <input type="password" id="signup-confirm" name="confirm_password" placeholder="Repeat your password"><br><br>

    <label for="signup-isadmin">
      <input type="checkbox" id="signup-isadmin" name="is_admin">
      I am a Company Admin
    </label><br><br>

    <button type="submit">Create Account</button>
  </form>

  <p>Already have an account? <a href="login.html">Login</a></p>

</body>
</html>
