<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Edit Job Listing</title>
  </head>

  <body>
    <header class="header">
      <h1>NexJob</h1>
      <nav class="nav">
        <a href="Dashboard.html">Dashboard</a> |
        <a href="Add-job.html">Post a Job</a> |
        <a href="Manage-jobs.html">My Jobs</a> |
        <a href="Company_settings.html">Settings</a>
        <hr />
      </nav>
    </header>

    <main class="main">
      <a href="manage-jobs.html">← Back to My Jobs</a>
      <h2>Edit Job Listing</h2>
      <p>Update the job details.</p>
      <form action="#" method="get">
        <div class="form-group">
          <label for="job_title">Job Title:</label><br />
          <input type="text" id="job_title" name="job_title" required />
        </div>
        <br />
        <div class="form-group">
          <label for="company_name">Company Name:</label><br />
          <input type="text" id="company_name" name="company_name" required />
        </div>
        <br />
        <div class="form-group">
          <label for="status">Job Status:</label><br />
          <select id="status" name="status" required>
            <option value="">Select Status</option>
            <option value="open">Open</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <br />
        <div class="form-group">
          <label>Salary Range:</label><br />
          <input
            type="number"
            name="salary_min"
            placeholder="Minimum Salary"
            min="0"
            required
          />
          <input
            type="number"
            name="salary_max"
            placeholder="Maximum Salary"
            min="0"
            required
          />
        </div>
        <br />
        <div class="form-group">
          <label for="experience">Years of Experience:</label><br />
          <input
            type="number"
            id="experience"
            name="experience"
            min="0"
            required
          />
        </div>
        <br />
        <div class="form-group">
          <label for="description">Job Description:</label><br />
          <textarea
            id="description"
            name="description"
            rows="8"
            cols="60"
            required
          ></textarea>
        </div>
        <br />
        <div class="form-group">
          <label for="responsibilities">Responsibilities:</label><br />
          <textarea
            id="responsibilities"
            name="responsibilities"
            rows="6"
            cols="60"
            required
          ></textarea>
        </div>
        <br />
        <div class="form-group">
          <label for="requirements">Requirements:</label><br />
          <textarea
            id="requirements"
            name="requirements"
            rows="6"
            cols="60"
            required
          ></textarea>
        </div>
        <br />
        <div class="form-actions">
          <input type="reset" value="Cancel" />
          <input type="submit" value="Update Job" />
        </div>
      </form>
    </main>

    <footer>
      <div class="footer-container">
        <p>&copy; 2026 NexJob. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
