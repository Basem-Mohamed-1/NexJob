<html>
  <head>
    <meta charset="UTF-8" />
    <title>Create A New Opportunity</title>
    <viewport content="width=device-width, initial-scale=1.0" />

    <!-- Normalize File to normalize the page  -->
    <link rel="stylesheet" href="../css/normalize.css">
    
    <!-- Link to the Css File  -->
     <link rel="stylesheet" href="../css/create_new_opportunity.css">

    <!-- Link to the Global Css File  -->
    <link rel="stylesheet" href="../css/global.css>"
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
   
    <!-- Link to the Fontawsome Lib -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Link to the Google Font API -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
  </head>

  <body>
    
    <!-- Header has Only The Nav Bar -->
    <header>

      <div class="container">
        <nav>
          
          <div class="icon">
            <i class="main-icon fa-solid fa-briefcase" href="Dashboard.html"></i>
            <h2>NexJob</h2>
          </div>

          <div class="items">
            <a href="Dashboard.html">Dashboard</a>
            <a href="create_a_new_opportunity.html">Post a Job</a>
            <a href="my_job_postings.html">my Jobs</a>
            <a href="Company_settings.html">Settings</a>
          </div>
          
          <i class="settings-icon fa-solid fa-bars-staggered"></i>
           
        </nav>
      </div>
      
    </header>

    <!-- Start Main Section -->
    <section class="main">
      <div class= "main-container">
        
        <!-- Start Header of The Main Content -->
        <div class="main-header">
          <h1>Create a New Opportunity</h1>
          <p>Fill in the details below to publish your job listing.</p>
        </div>
        <!-- End Header of The Main content -->

        <br>


        <!-- Start Job Details Secion -->
        <div class="job-content">
          <div class="job-details-container">
            <h3>Job Details</h3>

            <form class="job-details-form">

              <!-- Job Title Input -->
              <div class="job-title">
                <h4>Job Title</h4>
                <div class="job-title-input">
                   <i class="fa-regular fa-address-card"></i>  
                   <input type="text" class="job-title-input-field" placeholder="e.g Senior Product Manager">
                </div>
              </div>

              <!-- Start Employment Type Input  -->
              <div class="job-employment">
                <h4>Job Title</h4>
                <div class="job-employment-input">
                   <i class="fa-regular fa-address-card"></i> 

                   <!-- Select Menu for Jobs  -->
                   <select name="work" id="types-of-work">
                    
                        <option value="1">Full-Time</option>
                        <option value="2">Part-Time</option>
                        <option value="3">Contarct</option>
                        <option value="4" selected>Freelance</option>
                        <option value="5">InterntShip</option>

                    </select>
                </div>
              </div>
              <!-- End Employment Type Input  -->

              <!-- Start Location Type Input  -->
              <div class="job-Location">
                <h4>Job Title</h4>
                <div class="job-Location-input">
                   <i class="fa-regular fa-address-card"></i>  
                   <input type="text" class="job-Location-input-field" placeholder="e.g San Fransico Ca or Remote">
                </div>
              </div>
              <!-- End Location Type Input  -->


              <!-- Start Salary Range Type Input  -->
              <div class="job-salary">
                <h4>Job Title</h4>
                <div class="job-salary-input">
                   <i class="fa-regular fa-address-card"></i>  
                   <div class="salary-range">
                    <input type="number" name="number" min="10" max="100" step="10">
                    <input type="number" name="number" min="10" max="100" step="10">
                   </div>
                </div>
              </div>
              <!-- End Salary Range Type Input  -->

            </form>
          </div>
        </div>
        <!-- End Job Details Secion -->


        <!-- Start Role Description -->
        
        <div class="role-description">

          <h3>Role Description</h3>

          <From class="role-description-form">
            <h5>Description</h5>
            <textarea name="work-description"  placeholder="Description"></textarea>
          </div>
        </div>

        <!-- End Role Description -->


        <br>
        
        <!-- Start Button Field -->
        <div class="submit-field">
          <h3>Cancle</h3>
          <h3>Publish Job</h3>    
        </div>
        <!-- End Button Field -->

      </div>
    </section>
    <!-- Start Main Section -->
    

  </body>
</html>
