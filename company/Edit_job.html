<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/Edit_job.css" />
  <title>Edit Job Listing</title>
</head>

<body>
  <nav class="navbar">
  <div class="nav-container">

    <div class="logo">
      <a href="Edit_job.html"></a><i class="fa-solid fa-briefcase"></i>
      <h2>NexJob</h2>
    </div>

    <ul class="nav-menu">
      <li><a href="Dashboard.html">Dashboard</a></li>
      <li><a href="create_a_new_opportunity.html">Post a Job</a></li>
      <li><a href="my_job_postings.html">My Jobs</a></li>
      <li><a href="Company_settings.html">Settings</a></li>
    </ul>

    <button id="darkModeToggle" class="dark-mode-toggle">
      <i class="fas fa-moon"></i>
    </button>

    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>
</nav>

  <main class="main">
    <h2>Edit Job Listing</h2>
    <p>Update the job details.</p>
    <form action="#" method="get">
      <div class="form-group">
        <label for="job_title">Job Title:</label><br />
        <input type="text" id="job_title" name="job_title" required />
      </div>
      <br />
      <div class="form-group">
        <label for="company_name">Company Name:</label><br />
        <input type="text" id="company_name" name="company_name" required />
      </div>
      <br />
      <div class="form-group">
        <label for="status">Job Status:</label><br />
        <select id="status" name="status" required>
          <option value="">Select Status</option>
          <option value="open">Open</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <br />
      <div class="form-group">
        <label>Salary Range:</label><br />
        <input type="number" name="salary_min" placeholder="Minimum Salary" min="1000" step="500" required />
        <input type="number" name="salary_max" placeholder="Maximum Salary" min="10000" step="500" required />
        <small class="field-error" id="salaryError"></small>
      </div>
      <br />
      <div class="form-group">
        <label for="experience">Years of Experience:</label><br />
        <input type="number" id="experience" name="experience" min="0" step="1" required />
      </div>
      <br />
      <div class="form-group">
        <label for="description">Job Description:</label><br />
        <textarea id="description" name="description" rows="8" cols="60" required></textarea>
      </div>
      <br />
      <div class="form-group">
        <label for="responsibilities">Responsibilities:</label><br />
        <textarea id="responsibilities" name="responsibilities" rows="6" cols="60" required></textarea>
      </div>
      <br />
      <div class="form-group">
        <label for="requirements">Requirements:</label><br />
        <textarea id="requirements" name="requirements" rows="6" cols="60" required></textarea>
      </div>
      <br />
      <div class="form-actions">
        <input type="reset" value="Cancel" />
        <input type="submit" value="Update Job" />
      </div>
    </form>
  </main>

</body>

</html>
