<html>
  <head>
    <meta charset="UTF-8" />
    <title>Create A New Opportunity</title>
  </head>

  <body>
    <nav>
      <div>
        <a href="Dashboard.html"><i class="fa-solid fa-briefcase"></i></a>
        <h2>NexJob</h2>
      </div>

      <div>
        <a href="Dashboard.html">Dashboard</a>
        <a href="create_a_new_opportunity.html">Post a Job</a>
        <a href="my_job_postings.html">my Jobs</a>
        <a href="Company_settings.html">Settings</a>
      </div
    </nav>
    <h1>Create a New Opportunity</h1>
    <p>Fill in the details below to publish your job listing.</p>

    <form
      method="GET"
      action="javascript:void(0);"
      onsubmit="go_to_my_job_postings_file()"
    >
      <ul>
        <li>
          <strong> Job Details </strong>
          <ul>
            <li>
              <div>
                <label for="job_title"> Job Title </label>
                <br />
                <input
                  type="text"
                  placeholder="e.g. Senior Product Designer"
                  name="job_title"
                  id="job_title"
                  required
                />
              </div>
            </li>

            <br />

            <li>
              <div>
                <label> Employment Type </label>
                <br />
                <input
                  type="radio"
                  name="employment_type"
                  id="part_time"
                  required
                />
                <label for="part_time"> Part-Time </label>

                <input
                  type="radio"
                  name="employment_type"
                  id="full_time"
                  required
                />
                <label for="full_time"> Full-Time </label>
              </div>
            </li>

            <br />

            <li>
              <div>
                <label for="location"> Location </label>
                <br />
                <input
                  type="text"
                  placeholder="e.g. Cairo or Remote"
                  name="location"
                  id="location"
                  required
                />
              </div>
            </li>

            <br />

            <li>
              <div>
                <label> Salary Range </label>
                <br />
                <input
                  type="number"
                  placeholder="$ Min"
                  name="salary_range"
                  id="salary_range"
                  min="1000"
                  max="50000"
                  step="1000"
                  required
                />
                <input
                  type="number"
                  placeholder="$ Max"
                  name="salary_range"
                  id="salary_range"
                  min="50000"
                  max="100000"
                  step="1000"
                  required
                />
              </div>
            </li>

            <br />
          </ul>
        </li>

        <li>
          <strong> Role Description </strong>
          <ul>
            <li>
              <div>
                <label for="description"> Description </label>
                <br />
                <textarea
                  placeholder="Describe the responsibilities and requirements."
                  name="description"
                  id="description"
                  rows="5"
                  cols="50"
                  required
                ></textarea>
              </div>
            </li>

            <br />

            <li>
              <div>
                <label for="requirements_and_skills">
                  Requirements & Skills
                </label>
                <br />
                <textarea
                  placeholder="Write Requirements & Skills."
                  name="requirements_and_skills"
                  id="requirements_and_skills"
                  rows="5"
                  cols="50"
                  required
                ></textarea>
              </div>
            </li>
          </ul>
        </li>
      </ul>

      <br />

      <div>
        <input type="button" value="Cancel" onclick="go_back()" />
        <script>
          function go_back() {
            window.history.back();
          }
        </script>

        <input type="submit" value="Publish Job" />
        <script>
          function go_to_my_job_postings_file() {
            window.location.href = "my_job_postings.html";
          }
        </script>
      </div>
    </form>
  </body>
</html>
