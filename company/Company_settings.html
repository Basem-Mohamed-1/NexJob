<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Admin Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/company_settings.css" />
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">

      <div class="logo">
        <a href="Company_settings.html"></a><i class="fa-solid fa-briefcase"></i>
        <h2>NexJob</h2>
      </div>

      <ul class="nav-menu">
        <li><a href="Dashboard.html">Dashboard</a></li>
        <li><a href="create_a_new_opportunity.html">Post a Job</a></li>
        <li><a href="my_job_postings.html">My Jobs</a></li>
        <li><a href="Company_settings.html" class="active">Settings</a></li>
      </ul>

      <button id="darkModeToggle" class="dark-mode-toggle">
        <i class="fas fa-moon"></i>
      </button>

      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>
  </nav>

  <main class="main">
    <h2>Company Admin Settings</h2>
    <p>Manage your organization profile and account settings.</p>

    <!-- Account Information -->
    <form action="#" method="get">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required />
      </div>

      <div class="form-group">
        <label for="email">Contact Email</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-actions">
        <input type="reset" value="Cancel" />
        <input type="submit" value="Save Changes" />
      </div>
    </form>

    <!-- Company Profile -->
    <form action="#" method="post">
      <div class="form-group">
        <label for="company_name">Company Name</label>
        <input type="text" id="company_name" name="company_name" required />
      </div>

      <div class="form-group">
        <label for="website">Company Website</label>
        <input type="url" id="website" name="website" />
      </div>

      <div class="form-group">
        <label for="location">Headquarters Location</label>
        <input type="text" id="location" name="location" required />
      </div>

      <div class="form-group">
        <label for="company_desc">Company Description</label>
        <textarea id="company_desc" name="description" rows="6" maxlength="500" required></textarea>
        <span class="char-counter">0 / 500</span>
      </div>

      <div class="form-actions">
        <input type="reset" value="Discard" />
        <input type="submit" value="Save Profile" />
      </div>
    </form>

    <!-- Security -->
    <form action="#" method="post">
      <div class="form-group password-wrapper">
        <label for="new_password">New Password</label>

        <div class="password-field">
          <input type="password" id="new_password" name="new_password" required />

          <i class="fas fa-eye toggle-password" data-target="new_password"></i>
        </div>

        <div class="strength-bar-wrap">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <span class="strength-label" id="strengthLabel"></span>
      </div>

      <div class="form-group password-wrapper">
        <label for="confirm_password">Confirm Password</label>

        <div class="password-field">
          <input type="password" id="confirm_password" name="confirm_password" required />

          <i class="fas fa-eye toggle-password" data-target="confirm_password"></i>
        </div>
      </div>

      <div class="form-actions">
        <input type="submit" value="Update Security" />
      </div>
    </form>

    <!-- Notifications -->
    <form action="#" method="post">
      <div class="form-group">
        <label><input type="checkbox" name="email_notif" /> Receive Email Notifications</label>
        <label><input type="checkbox" name="app_alerts" /> Application Alerts</label>
        <label><input type="checkbox" name="newsletter" /> Monthly Newsletter</label>
      </div>

      <div class="form-actions">
        <input type="submit" value="Save Preferences" />
      </div>
    </form>
  </main>

  <footer>
    <div class="container">
      <div class="about">
        <div class="about-content">
          <div class="icon">
            <i class="main-icon fa-solid fa-briefcase"></i>
            <h2>NexJob</h2>
          </div>
          <p>Making the job hunt easier for everyone.</p>
        </div>
        <p class="copy-right">&copy; 2026 NexJob. All rights reserved</p>
      </div>
    </div>
  </footer>


  <script src="../js/navbar.js"></script>
  <script src="../js/company_settings.js"></script>
</body>

</html>
