{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexJob - My Profile</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/confirm.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="{% url 'jobseeker_home' %}"><i class="fa-solid fa-briefcase"></i></a>
                <h2>NexJob</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="{% url 'jobseeker_home' %}">Home</a></li>
                <li><a href="{% url 'find_jobs' %}">Find Jobs</a></li>
                <li><a href="{% url 'my_applications' %}">My Applications</a></li>
                <li class="nav-profile">
                    <a href="#" class="profile-link">
                        <i class="fa-solid fa-user-circle"></i>
                        <span>Profile</span>
                    </a>
                    <div class="profile-dropdown">
                        <a href="{% url 'jobseeker_profile' %}"><i class="fa-solid fa-id-card"></i> My Profile</a>
                        <a href="#" onclick="logoutUser(); window.location.href='{% url 'login' %}';">
                            <i class="fa-solid fa-sign-out-alt"></i> Logout
                        </a>
                    </div>
                </li>
            </ul>
            <button
                id="darkModeToggle"
                class="dark-mode-toggle"
                aria-label="Toggle dark mode"
            >
                <i class="fas fa-moon"></i>
            </button>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    <main class="main">
        <div class="main-container">
            <div class="profile-page">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">J</div>
                    <div class="profile-info">
                        <h1 id="profileName">Job Seeker</h1>
                        <p id="profileEmail">email@example.com</p>
                        <span class="profile-type">Job Seeker</span>
                    </div>
                </div>
                <div class="profile-sections">
                    <div class="profile-card">
                        <h2><i class="fa-solid fa-user"></i> Personal Information</h2>
                        <form id="profileForm">
                            <div class="profile-field">
                                <label>Full Name</label>
                                <input type="text" id="fullName" name="fullName" placeholder="Your full name" />
                            </div>
                            <div class="profile-field">
                                <label>Email</label>
                                <input type="email" id="profileEmailInput" name="email" />
                            </div>
                            <div class="profile-field">
                                <label>Phone</label>
                                <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900" />
                            </div>
                            <div class="profile-field">
                                <label>Location</label>
                                <input type="text" id="location" name="location" placeholder="City, Country" />
                            </div>
                            <div class="profile-field">
                                <label>Skills</label>
                                <input type="text" id="skills" name="skills" placeholder="JavaScript, Python, Node.js..." />
                            </div>
                            <div class="profile-actions">
                                <button type="submit" class="btn-primary">Save Changes</button>
                                <button type="button" class="btn-secondary" onclick="resetProfileForm()">Cancel</button>
                            </div>
                        </form>
                    </div>
                    <div class="profile-card">
                        <h2><i class="fa-solid fa-briefcase"></i> Application Stats</h2>
                        <div id="statsContainer">
                            <div class="profile-field">
                                <label>Total Applications</label>
                                <span id="totalApps">0</span>
                            </div>
                            <div class="profile-field">
                                <label>Pending</label>
                                <span id="pendingApps">0</span>
                            </div>
                            <div class="profile-field">
                                <label>Interview</label>
                                <span id="interviewApps">0</span>
                            </div>
                            <div class="profile-field">
                                <label>Hired</label>
                                <span id="hiredApps">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="{% static 'js/storage.js' %}"></script>
    <script src="{% static 'js/utils.js' %}"></script>
    <script src="{% static 'js/navbar.js' %}"></script>
    <script src="{% static 'js/jobseeker_profile.js' %}"></script>
</body>
</html>
