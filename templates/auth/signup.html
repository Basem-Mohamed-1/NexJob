{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/confirm.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/normalize.css' %}">
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">

    <link
        href="https://unpkg.com/ionicons@4.5.10-0/dist/css/ionicons.min.css"
        rel="stylesheet"
    />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Sign Up – NexJob</title>
</head>
<body>
    <!--NAV BAR-->

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="{% url 'home' %}"><i class="fa-solid fa-briefcase"></i></a>
                <h2>NexJob</h2>
            </div>

            <button
                id="darkModeToggle"
                class="dark-mode-toggle"
                aria-label="Toggle dark mode"
            >
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <!--THE SECTION-->

    <section class="sec">
        <div class="cont">
            <h1>Create Account</h1>
            <h2>Join us to find your next opportunity</h2>

            <div class="btns">
                <span class="job-seeker">
                    <p>Job seeker</p>
                    <ion-icon name="search"></ion-icon>
                </span>
                <span class="admin">
                    <p>Company admin</p>
                    <ion-icon name="briefcase"></ion-icon>
                </span>
            </div>

            <form
                id="signup-form"
                class="form1 active"
                onsubmit="signupSubmitFunction(event)"
            >
                <div class="userinputs">
                    <label for="signup-username">Username</label>
                    <input
                        type="text"
                        id="signup-username"
                        name="username"
                        placeholder="Choose a username"
                    />
                    <p
                        class="usernamep"
                        style="margin: -10px 0px 10px 0px; text-align: left; color: red"
                    ></p>

                    <label for="signup-email">Email</label>
                    <input
                        type="email"
                        id="signup-email"
                        name="email"
                        placeholder="you@example.com"
                    />
                    <p
                        class="emailp"
                        style="margin: -10px 0px 10px 0px; text-align: left; color: red"
                    ></p>

                    <label for="admin-signup-companyname" class="hidden">Company name</label>
                    <input
                        type="text"
                        id="admin-signup-companyname"
                        name="Companyname"
                        class="hidden"
                        placeholder="Enter Company name"
                    />
                </div>

                <div class="pass">
                    <span>
                        <label for="signup-password">Password</label>
                        <input
                            type="password"
                            id="signup-password"
                            name="password"
                            placeholder="Create a password"
                        />
                    </span>

                    <span>
                        <label for="signup-confirm">Confirm Password</label>
                        <input
                            type="password"
                            id="signup-confirm"
                            name="confirm_password"
                            placeholder="Confirm password"
                        />
                    </span>
                </div>
                <div class="strengthBar"><div class="filledBar"></div></div>
                <p class="strengthText"></p>

                <p
                    class="passp"
                    style="margin: -10px 0px 10px 0px; text-align: left; color: red"
                ></p>
                <p
                    class="confirmpassp"
                    style="margin: -10px 0px 10px 0px; text-align: left; color: red"
                ></p>

                <button type="submit" id="seekersubmitButton">
                    Create Account <ion-icon name="arrow-forward"></ion-icon>
                </button>
            </form>

            <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
        </div>
    </section>

    <!--THE FOOTER-->

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 NexJob. All rights reserved.</p>
            <div class="footer-links">
                <a href="{% url 'about' %}">About</a>
                <a href="{% url 'contact' %}">Contact</a>
            </div>
        </div>
    </footer>

    <script src="{% static 'js/storage.js' %}"></script>
    <script src="{% static 'js/utils.js' %}"></script>
    <script src="{% static 'js/navbar.js' %}"></script>
    <script src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons.js"></script>
    <script src="{% static 'js/signup.js' %}"></script>
</body>
</html>
