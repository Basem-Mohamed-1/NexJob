{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexJob - Applications</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/confirm.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
    <link rel="stylesheet" href="{% static 'css/applications.css' %}">
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap"
        rel="stylesheet"
    />
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <a href="{% url 'company_dashboard' %}"><i class="fa-solid fa-briefcase"></i></a>
                    <h2>NexJob</h2>
                </div>
                <ul class="nav-menu">
                    <li><a href="{% url 'company_dashboard' %}">Dashboard</a></li>
                    <li><a href="{% url 'create_job' %}">Post a Job</a></li>
                    <li><a href="{% url 'my_jobs' %}">My Jobs</a></li>
                    <li><a href="{% url 'applications' %}" class="active">Applications</a></li>
                    <li><a href="{% url 'company_settings' %}">Settings</a></li>
                    <li class="nav-profile">
                        <a href="#" class="profile-link">
                            <i class="fa-solid fa-user-circle"></i>
                            <span>Profile</span>
                        </a>
                        <div class="profile-dropdown">
                            <a href="{% url 'company_profile' %}"><i class="fa-solid fa-id-card"></i> My Profile</a>
                            <a href="#" onclick="logoutUser(); window.location.href='{% url 'login' %}';">
                                <i class="fa-solid fa-sign-out-alt"></i> Logout
                            </a>
                        </div>
                    </li>
                </ul>
                <button
                    id="darkModeToggle"
                    class="dark-mode-toggle"
                    aria-label="Toggle dark mode"
                >
                    <i class="fas fa-moon"></i>
                </button>
                <div class="hamburger"><span></span> <span></span> <span></span></div>
            </div>
        </nav>
    </header>
    <main class="main">
        <div class="main-container">
            <div class="page-header">
                <h1>Job Applications</h1>
                <p>View and manage applications for your job postings.</p>
            </div>
            <div class="filter-section">
                <select id="jobSelect" class="job-select">
                    <option value="">All Jobs</option>
                </select>
            </div>
            <div class="applications-container"></div>
        </div>
    </main>
    <script src="{% static 'js/storage.js' %}"></script>
    <script src="{% static 'js/utils.js' %}"></script>
    <script src="{% static 'js/company.js' %}"></script>
    <script src="{% static 'js/navbar.js' %}"></script>
</body>
</html>
